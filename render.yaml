# Render Blueprint — provisions the Yobou API as a free-tier Node web service
# with a persistent disk for the SQLite database.
#
# How to deploy (one-time):
#   1. Sign in to https://dashboard.render.com with the GitHub account that owns
#      this repo (ISSA-DX / Yobou_Market).
#   2. Click "New +" → "Blueprint" → connect this repo.
#   3. Render reads this file and creates:
#        - Service "yobou-server" (Node, free plan, persistent disk)
#      It assigns the public URL https://yobou-server.onrender.com.
#   4. After first deploy, set the JWT secrets in the Render dashboard
#      (Environment tab) to long random strings — see DEPLOY.md.
#
# Cost: $0/month on Render's free tier (750 instance-hours/month, persistent
# disk free for 1GB). The instance spins down after 15 min of no traffic;
# the first request after idle takes ~30s to wake up.

services:
  - type: web
    name: yobou-server
    runtime: node
    plan: free
    rootDir: server
    # Build command — installs deps, generates Prisma client, runs migrations
    # against the persistent SQLite file. No schema changes here: `prisma db push`
    # is idempotent and a no-op when the schema is already in sync.
    # Build command — installs deps and generates the Prisma client. We
    # deliberately don't run `prisma db push` here: the persistent disk
    # is mounted at runtime, not build time, so the build-time DATABASE_URL
    # would point at a non-existent path and the migration would fail.
    buildCommand: npm install && npx prisma generate
    # Start command — runs the schema migration against the persistent
    # disk (now mounted), seeds the DB if it's empty, then boots the API.
    # Uses our boot.js wrapper which:
    #   - picks a writable data dir (/var/data if mounted, else /tmp)
    #   - sets DATABASE_URL/UPLOAD_DIR to the resolved paths
    #   - runs prisma db push, then seedIfEmpty, then the API
    # Render runs this with `sh -c`, so the && chain works.
    startCommand: node src/boot.js
    # NOTE: persistent disks are NOT available on Render's free tier
    # (as of mid-2024). boot.js picks /tmp/yobou-data as the data dir
    # automatically, so the service still boots and works — data just
    # doesn't persist across deploys. For pilot testing this is fine:
    # the database is re-seeded from prisma/seed.js on every boot.
    # When you upgrade to a paid plan, uncomment the disk block below.
    #
    # disk:
    #   name: yobou-data
    #   mountPath: /var/data
    #   sizeGB: 1
    envVars:
      # Render assigns PORT automatically. boot.js picks the data dir
      # at runtime (/var/data if the persistent disk is mounted, else
      # /tmp/yobou-data), then sets DATABASE_URL/UPLOAD_DIR to the
      # resolved paths. The values below are only fallbacks.
      - key: DATABASE_URL
        value: file:/tmp/yobou-data/dev.db
      - key: UPLOAD_DIR
        value: /tmp/yobou-data/uploads
      - key: NODE_ENV
        value: production
      # JWT secrets — OVERRIDE THESE in the Render dashboard before the first
      # deploy. Generate long random strings with:
      #   node -e "console.log(require('crypto').randomBytes(48).toString('hex'))"
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      # CORS_ORIGIN is appended to the default allow-list in src/index.js.
      # The defaults already include https://issa-dx.github.io (covers the
      # GitHub Pages subpath under ISSA-DX/Yobou_Market), so leaving
      # this empty is fine for the pilot. Add additional origins here if
      # you deploy the web apps elsewhere (comma-separated).
      - key: CORS_ORIGIN
        value: ""
      # Health check — Render pings this periodically to know the service
      # is alive and to wake it from idle.
      - key: HEALTHCHECK_PATH
        value: /api/health
      # When set, boot.js runs `prisma migrate deploy` against the
      # persistent disk instead of `prisma db push`. Production-safe —
      # migrations are idempotent and traceable. The dev path (db push)
      # stays the default so `npm run dev` keeps working without
      # bookkeeping. See server/prisma/migrations/.
      - key: MIGRATIONS_ENABLED
        value: "1"
    healthCheckPath: /api/health
    autoDeploy: true  # redeploy on every push to the repo's default branch