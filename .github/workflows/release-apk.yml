# Builds the Android APK and publishes it as a GitHub Release.
#
# Triggers when you push a version tag (v0.1.0, v1.2.3, etc.). The
# workflow builds the release APK, attaches it to a GitHub Release with
# auto-generated notes, and uploads it as yobou-market.apk.
#
# Pilots install the APK from the Releases page:
#   https://github.com/ISSA-DX/Yobou_Market/releases/latest/download/yobou-market.apk
#
# To publish a new release:
#   git tag v0.1.0
#   git push origin v0.1.0
#
# Required secrets (set in repo Settings → Secrets and variables → Actions):
#   - YOBOU_KEYSTORE_BASE64     base64 of android/app/yobou-release.keystore
#   - YOBOU_KEYSTORE_PASSWORD   keystore store password
#   - YOBOU_KEY_ALIAS           key alias inside the keystore (e.g. "yobou")
#   - YOBOU_KEY_PASSWORD        key password
# Generate the keystore locally with:
#   keytool -genkeypair -v -keystore yobou-release.keystore -alias yobou \
#           -keyalg RSA -keysize 2048 -validity 9125 -storepass <pw> \
#           -keypass <pw> -dname "CN=Yobou Market, OU=Mobile, O=Yobou, L=City, ST=State, C=US"
# Encode with: certutil -encode yobou-release.keystore temp.b64 (then strip the
# BEGIN/END lines and whitespace before pasting).
#
# Cost: $0. GitHub Releases are free for public repos; storage is unlimited.
#
# Keystore rotation: when this keystore is replaced, users who already have
# the old APK installed must uninstall it before installing the new build —
# Android refuses to upgrade across signing-cert mismatches. Document this
# in the release notes.

name: Build & release Android APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  VITE_API_BASE: https://yobou-server.onrender.com

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java (for Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # No Android SDK pre-installed on ubuntu-latest — set it up.
      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install root deps
        run: npm install --no-audit --no-fund --no-workspaces

      - name: Install shopper deps
        working-directory: APP_shopper_and_buyer
        run: npm install --no-audit --no-fund

      # Build the web bundle first (Vite) so dist/ has the prod assets
      # baked into the APK. VITE_API_BASE points the bundled JS at the
      # Render-deployed API; VITE_BASE_PATH=./ emits RELATIVE asset URLs
      # in index.html (./assets/...) instead of absolute GitHub-Pages
      # paths (/Yobou_Market/assets/...). The Capacitor WebView serves
      # the bundle from https://localhost/, where absolute /Yobou_Market/
      # paths 404 and produce a blank white screen.
      - name: Build shopper web bundle
        working-directory: APP_shopper_and_buyer
        run: set -o pipefail; npm run build:prod 2>&1 | tee /tmp/shopper-build.log
        env:
          VITE_API_BASE: ${{ env.VITE_API_BASE }}
          VITE_BASE_PATH: ./

      - name: Copy web assets into Android project
        working-directory: APP_shopper_and_buyer
        run: set -o pipefail; npx cap sync android 2>&1 | tee /tmp/cap-sync.log

      # Decode the release keystore from secrets into a temp file the
      # Gradle build can read. The path is passed via -P so app/build.gradle
      # picks it up (see android/gradle.properties for the contract).
      - name: Decode release keystore
        if: ${{ env.YOBOU_KEYSTORE_BASE64 != '' }}
        env:
          YOBOU_KEYSTORE_BASE64: ${{ secrets.YOBOU_KEYSTORE_BASE64 }}
        run: |
          set -e
          echo "$YOBOU_KEYSTORE_BASE64" | base64 -d > /tmp/yobou-release.keystore
          ls -la /tmp/yobou-release.keystore
          chmod 600 /tmp/yobou-release.keystore

      - name: Build release APK
        working-directory: APP_shopper_and_buyer/android
        env:
          YOBOU_KEYSTORE_PATH: ${{ secrets.YOBOU_KEYSTORE_BASE64 != '' && '/tmp/yobou-release.keystore' || '' }}
          YOBOU_KEYSTORE_PASSWORD: ${{ secrets.YOBOU_KEYSTORE_PASSWORD }}
          YOBOU_KEY_ALIAS: ${{ secrets.YOBOU_KEY_ALIAS }}
          YOBOU_KEY_PASSWORD: ${{ secrets.YOBOU_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          set -o pipefail
          if [ -n "$YOBOU_KEYSTORE_PATH" ]; then
            ./gradlew assembleRelease \
              -PYOBOU_KEYSTORE_PATH="$YOBOU_KEYSTORE_PATH" \
              -PYOBOU_KEYSTORE_PASSWORD="$YOBOU_KEYSTORE_PASSWORD" \
              -PYOBOU_KEY_ALIAS="$YOBOU_KEY_ALIAS" \
              -PYOBOU_KEY_PASSWORD="$YOBOU_KEY_PASSWORD" \
              2>&1 | tee /tmp/gradle-build.log
          else
            # No keystore configured — fall back to debug signing so the
            # workflow still produces an installable APK for local pilots.
            ./gradlew assembleRelease 2>&1 | tee /tmp/gradle-build.log
          fi

      - name: Locate APK
        id: locate
        working-directory: APP_shopper_and_buyer
        run: |
          set +e
          {
            echo "=== pwd ===" && pwd
            echo "=== ls android/app/build/outputs ==="
            ls -la android/app/build/outputs/ 2>&1 || true
            echo "=== ls apk dirs ==="
            ls -la android/app/build/outputs/apk/ 2>&1 || true
            ls -la android/app/build/outputs/apk/release/ 2>&1 || true
            echo "=== find anywhere (excluding node_modules) ==="
            find . -name '*.apk' -not -path '*/node_modules/*' 2>&1
            APK=$(find android/app/build/outputs/apk/release -name '*.apk' 2>/dev/null | head -1)
            if [ -z "$APK" ]; then
              echo "::error::No APK found in android/app/build/outputs/apk/release/"
              exit 1
            fi
            echo "apk_path=$APK" >> $GITHUB_OUTPUT
            echo "Built: $APK"
            ls -la "$APK"
          } 2>&1 | tee /tmp/locate.log

      - name: Rename APK for release
        working-directory: APP_shopper_and_buyer
        run: |
          APK=$(find android/app/build/outputs/apk/release -name '*.apk' | head -1)
          cp "$APK" ../yobou-market.apk
          ls -la ../yobou-market.apk

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: yobou-market-apk
          path: yobou-market.apk
          if-no-files-found: error

      # Always upload the build logs at the very end of the job so a
      # failure in any step (including the locate step) is captured.
      - name: Upload debug logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apk-debug-logs
          path: |
            /tmp/shopper-build.log
            /tmp/cap-sync.log
            /tmp/gradle-build.log
            /tmp/locate.log
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: yobou-market-apk
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: dist/yobou-market.apk