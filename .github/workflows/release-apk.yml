# Builds the Android APK and publishes it as a GitHub Release.
#
# Triggers when you push a version tag (v0.1.0, v1.2.3, etc.). The
# workflow builds the release APK, attaches it to a GitHub Release with
# auto-generated notes, and uploads it as yobou-market.apk.
#
# Pilots install the APK from the Releases page:
#   https://github.com/ISSA-DX/Yobou_Market/releases/latest/download/yobou-market.apk
#
# To publish a new release:
#   git tag v0.1.0
#   git push origin v0.1.0
#
# Required secrets: none (GitHub Actions runners already have the Java
# and Android SDK tooling installed via the actions/setup-java step).
#
# Cost: $0. GitHub Releases are free for public repos; storage is
# unlimited.

name: Build & release Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name (e.g. v0.1.0) — only used for the release title'
        required: false

permissions:
  contents: write   # needed to create the release

env:
  VITE_API_BASE: https://yobou-server.onrender.com

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java (for Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # No Android SDK pre-installed on ubuntu-latest — set it up.
      # accept-licenses is required so the build doesn't prompt.
      # NOTE: must be @v4 — the @v3 tag was unpublished when the action
      # was rewritten. Pinning @v3 caused GitHub to silently mark the
      # run as failed with zero jobs (workflow eval skipped because the
      # referenced action doesn't exist).
      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install root deps
        run: npm install --no-audit --no-fund --no-workspaces

      - name: Install shopper deps
        working-directory: APP_shopper_and_buyer
        run: npm install --no-audit --no-fund

      # Build the web bundle first (Vite) so dist/ has the prod assets
      # baked into the APK. The env var is what makes the bundled JS
      # point at the Render-deployed API instead of localhost.
      - name: Build shopper web bundle
        working-directory: APP_shopper_and_buyer
        run: |
          npm run build:prod 2>&1 | tee /tmp/shopper-build.log
          exit ${PIPESTATUS[0]}
        env:
          VITE_API_BASE: ${{ env.VITE_API_BASE }}

      - name: Copy web assets into Android project
        working-directory: APP_shopper_and_buyer
        run: npx cap sync android

      # Note: no release keystore is configured in the repo (the previous
      # local builds used Android's debug keystore). For pilot testing,
      # the debug-signed release APK is fine — it installs like any
      # other debug app and doesn't require Play Store. When you're
      # ready to ship to real users, add a keystore and the
      # YOBOU_KEYSTORE_PATH secrets and switch to a signed release.
      - name: Build release APK
        working-directory: APP_shopper_and_buyer/android
        run: |
          set +e
          ./gradlew assembleRelease 2>&1 | tee /tmp/gradle-build.log
          GRADLE_RC=${PIPESTATUS[0]}
          echo "--- gradle rc=$GRADLE_RC ---"
          if [ $GRADLE_RC -ne 0 ]; then
            echo "::error::gradlew assembleRelease failed (rc=$GRADLE_RC)"
            tail -80 /tmp/gradle-build.log
          fi
          exit $GRADLE_RC

      - name: Upload debug logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: apk-debug-logs
          path: |
            /tmp/shopper-build.log
            /tmp/gradle-build.log
          if-no-files-found: ignore

      - name: Locate APK
        id: locate
        working-directory: APP_shopper_and_buyer
        run: |
          APK=$(find android/app/build/outputs/apk/release -name '*.apk' | head -1)
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "Built: $APK"
          ls -la "$APK"

      - name: Verify APK is well-formed
        working-directory: APP_shopper_and_buyer
        run: |
          APK=$(find android/app/build/outputs/apk/release -name '*.apk' | head -1)
          # Sanity check: aapt should be able to dump the manifest. If
          # this fails, the APK is broken and we want the workflow to
          # fail loudly rather than ship a broken artifact.
          "$ANDROID_HOME/build-tools/$(ls -1 $ANDROID_HOME/build-tools | sort -V | tail -1)/aapt" \
            dump badging "$APK" | head -3

      - name: Rename APK for release
        working-directory: APP_shopper_and_buyer
        run: |
          APK=$(find android/app/build/outputs/apk/release -name '*.apk' | head -1)
          cp "$APK" yobou-market.apk
          ls -la yobou-market.apk

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: yobou-market-apk
          path: APP_shopper_and_buyer/yobou-market.apk
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: yobou-market-apk
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # When triggered by a tag push, use the tag. When triggered
          # manually, create a "pre-release" so testers get it without
          # it being a stable release.
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('manual-{0}', github.run_number) }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || format('Manual build #{0}', github.run_number) }}
          draft: false
          prerelease: ${{ github.ref_type != 'tag' }}
          generate_release_notes: true
          files: dist/yobou-market.apk
          body: |
            ## Yobou Market — Android APK

            **Install on Android:** tap the link below from your phone,
            allow "install from this source" in Settings, then open the
            downloaded file.

            👉 [Download yobou-market.apk](https://github.com/${{ github.repository }}/releases/latest/download/yobou-market.apk)

            ### Pilot credentials

            | Role | Email | Password |
            |---|---|---|
            | Customer | `shopper@yobou.test` | `Shopper123!` |
            | Admin    | `admin@yobou.test`    | `Admin123!`   |
            | Vendor (approved) | `vendor1@yobou.test` | `Vendor123!` |
            | Vendor (pending)  | `vendor2@yobou.test` | `Vendor123!` |

            ### What to test

            1. Log in as a customer — browse products, add to cart, check out.
            2. Log in as admin (in the browser admin portal) — approve the
               pending vendor and any pending product changes.
            3. Log in as the approved vendor — make a product edit and
               see the change flow back to admin for approval.

            ### Reporting issues

            Anything that doesn't work right, send me the exact text from
            the screen plus what you were doing. The app's error messages
            are now specific — quote them verbatim if you can.
