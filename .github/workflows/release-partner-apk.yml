# Builds the Yobou Partner (vendor) Android APK and publishes it as a
# GitHub Release.
#
# Mirrors release-apk.yml but targets the standalone vendor portal:
#   - appId: com.yobou.partner
#   - appName: "Yobou Partner"
#   - Output filename: yobou-partner.apk
#   - Separate keystore (PARTNER_KEYSTORE_*) so signing-cert rotation
#     on this app doesn't force-co-rotate the customer app.
#
# Triggers when you push a tag of the form `partner-v*` (e.g. partner-v0.1.0).
# The customer APK workflow watches `v*` — the `partner-` prefix keeps them
# from clobbering each other in the same repo.
#
# Pilots install the APK from the Releases page:
#   https://github.com/ISSA-DX/Yobou_Market/releases/latest/download/yobou-partner.apk
#
# To publish a new partner release:
#   git tag partner-v0.1.0
#   git push origin partner-v0.1.0
#
# Required secrets (set in repo Settings → Secrets and variables → Actions):
#   - PARTNER_KEYSTORE_BASE64     base64 of android/app/yobou-partner.keystore
#   - PARTNER_KEYSTORE_PASSWORD   keystore store password
#   - PARTNER_KEY_ALIAS           key alias inside the keystore (e.g. "yobou-partner")
#   - PARTNER_KEY_PASSWORD        key password
# Generate the keystore locally with:
#   keytool -genkeypair -v -keystore yobou-partner.keystore -alias yobou-partner \
#           -keyalg RSA -keysize 2048 -validity 9125 -storepass <pw> \
#           -keypass <pw> -dname "CN=Yobou Partner, OU=Mobile, O=Yobou, L=City, ST=State, C=US"
# Encode with: certutil -encode yobou-partner.keystore temp.b64 (then strip the
# BEGIN/END lines and whitespace before pasting).
#
# Cost: $0. GitHub Releases are free for public repos; storage is unlimited.
#
# Keystore rotation: when this keystore is replaced, users who already have
# the old APK installed must uninstall it before installing the new build —
# Android refuses to upgrade across signing-cert mismatches. Document this
# in the release notes.

name: Build & release Partner Android APK

on:
  push:
    tags:
      - 'partner-v*'

permissions:
  contents: write

env:
  VITE_API_BASE: https://yobou-server.onrender.com

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java (for Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # No Android SDK pre-installed on ubuntu-latest — set it up.
      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install root deps
        run: npm install --no-audit --no-fund --no-workspaces

      - name: Install partner deps
        working-directory: Partner_Web_Vendor
        run: npm install --no-audit --no-fund

      # Build the web bundle first (Vite) so dist/ has the prod assets
      # baked into the APK. VITE_BASE_PATH=./ emits RELATIVE asset URLs
      # so the Capacitor WebView (which serves from https://localhost/)
      # can resolve them — absolute /Yobou_Market/ paths would 404.
      - name: Build partner web bundle
        working-directory: Partner_Web_Vendor
        run: set -o pipefail; npm run build:prod 2>&1 | tee /tmp/partner-build.log
        env:
          VITE_API_BASE: ${{ env.VITE_API_BASE }}
          VITE_BASE_PATH: ./

      - name: Copy web assets into Android project
        working-directory: Partner_Web_Vendor
        run: set -o pipefail; npx cap sync android 2>&1 | tee /tmp/cap-sync.log

      # Decode the release keystore from secrets into a temp file the
      # Gradle build can read.
      - name: Decode release keystore
        if: ${{ env.PARTNER_KEYSTORE_BASE64 != '' }}
        env:
          PARTNER_KEYSTORE_BASE64: ${{ secrets.PARTNER_KEYSTORE_BASE64 }}
        run: |
          set -e
          echo "$PARTNER_KEYSTORE_BASE64" | base64 -d > /tmp/yobou-partner.keystore
          ls -la /tmp/yobou-partner.keystore
          chmod 600 /tmp/yobou-partner.keystore

      - name: Build release APK
        working-directory: Partner_Web_Vendor/android
        env:
          PARTNER_KEYSTORE_PATH: ${{ secrets.PARTNER_KEYSTORE_BASE64 != '' && '/tmp/yobou-partner.keystore' || '' }}
          PARTNER_KEYSTORE_PASSWORD: ${{ secrets.PARTNER_KEYSTORE_PASSWORD }}
          PARTNER_KEY_ALIAS: ${{ secrets.PARTNER_KEY_ALIAS }}
          PARTNER_KEY_PASSWORD: ${{ secrets.PARTNER_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          set -o pipefail
          if [ -n "$PARTNER_KEYSTORE_PATH" ]; then
            ./gradlew assembleRelease \
              -PPARTNER_KEYSTORE_PATH="$PARTNER_KEYSTORE_PATH" \
              -PPARTNER_KEYSTORE_PASSWORD="$PARTNER_KEYSTORE_PASSWORD" \
              -PPARTNER_KEY_ALIAS="$PARTNER_KEY_ALIAS" \
              -PPARTNER_KEY_PASSWORD="$PARTNER_KEY_PASSWORD" \
              2>&1 | tee /tmp/gradle-build.log
          else
            # No keystore configured — fall back to debug signing so the
            # workflow still produces an installable APK for local pilots.
            ./gradlew assembleRelease 2>&1 | tee /tmp/gradle-build.log
          fi

      - name: Locate APK
        id: locate
        working-directory: Partner_Web_Vendor
        run: |
          set +e
          {
            echo "=== pwd ===" && pwd
            echo "=== ls android/app/build/outputs ==="
            ls -la android/app/build/outputs/ 2>&1 || true
            echo "=== ls apk dirs ==="
            ls -la android/app/build/outputs/apk/ 2>&1 || true
            ls -la android/app/build/outputs/apk/release/ 2>&1 || true
            echo "=== find anywhere (excluding node_modules) ==="
            find . -name '*.apk' -not -path '*/node_modules/*' 2>&1
            APK=$(find android/app/build/outputs/apk/release -name '*.apk' 2>/dev/null | head -1)
            if [ -z "$APK" ]; then
              echo "::error::No APK found in android/app/build/outputs/apk/release/"
              exit 1
            fi
            echo "apk_path=$APK" >> $GITHUB_OUTPUT
            echo "Built: $APK"
            ls -la "$APK"
          } 2>&1 | tee /tmp/locate.log

      - name: Rename APK for release
        working-directory: Partner_Web_Vendor
        run: |
          APK=$(find android/app/build/outputs/apk/release -name '*.apk' | head -1)
          cp "$APK" ../yobou-partner.apk
          ls -la ../yobou-partner.apk

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: yobou-partner-apk
          path: yobou-partner.apk
          if-no-files-found: error

      - name: Upload debug logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: partner-apk-debug-logs
          path: |
            /tmp/partner-build.log
            /tmp/cap-sync.log
            /tmp/gradle-build.log
            /tmp/locate.log
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: yobou-partner-apk
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: dist/yobou-partner.apk